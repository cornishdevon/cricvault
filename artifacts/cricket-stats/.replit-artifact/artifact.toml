kind = "web"
previewPath = "/"
title = "Cricket Stats Tracker"
version = "1.0.0"
id = "artifacts/cricket-stats"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23131

[services.development]
run = "pnpm --filter @workspace/cricket-stats run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cricket-stats", "run", "build" ]
publicDir = "artifacts/cricket-stats/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23131"
BASE_PATH = "/"
