name: EAS Build iOS Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Write ASC API Key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          echo "$ASC_API_KEY_P8" > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8

      - name: Build on EAS
        working-directory: artifacts/cricket-log-mobile
        run: eas build --platform ios --profile production --non-interactive

      - name: Submit to App Store
        working-directory: artifacts/cricket-log-mobile
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          python3 -c "
          import json, os
          with open('eas.json') as f:
              cfg = json.load(f)
          ios = cfg['submit']['production']['ios']
          ios['ascApiKeyPath'] = '/tmp/AuthKey.p8'
          ios['ascApiKeyId'] = os.environ['ASC_API_KEY_ID']
          ios['ascApiKeyIssuerId'] = os.environ['ASC_API_KEY_ISSUER_ID']
          with open('eas.json', 'w') as f:
              json.dump(cfg, f)
          "
          eas submit --platform ios --latest --profile production --non-interactive
